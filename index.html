<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crafty Duo | Handmade Crochet Goods</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Palette precisely restored from X_2.jpg */
            --off-white: #F3F4F5;
            --muted-light: #DBE0E1;
            --orange-vibrant: #FF9408;
            --terracotta: #CA3F16;
            --wine-deep: #bb0d38;
            --near-black: #100C08;
            
            /* UI Containers */
            --glass-panel: rgba(16, 12, 8, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-white: var(--off-white);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--near-black) 0%, var(--wine-deep) 50%, var(--near-black) 100%);
            background-attachment: fixed;
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Fixed Navigation Header with Logo Integration */
        header {
            background: rgba(16, 12, 8, 0.85);
            backdrop-filter: blur(25px);
            padding: 10px 6%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 25px rgba(0,0,0,0.3);
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .header-logo {
            height: 65px;
            width: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--muted-light);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links .active-link {
            opacity: 1;
            color: var(--orange-vibrant);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-white);
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            transition: background 0.3s;
        }

        .cart-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: linear-gradient(90deg, var(--orange-vibrant), var(--terracotta));
            color: white;
            border-radius: 8px;
            padding: 1px 6px;
            font-size: 11px;
            font-weight: 700;
        }

        /* Updated Hero Section: Full Image Background with Centered Content Alignment */
        .hero {
            min-height: 95vh;
            padding: 140px 6% 80px 6%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(rgba(16, 12, 8, 0.45), rgba(16, 12, 8, 0.65)), 
                        url('Hi.png') no-repeat center center/cover;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .hero-content {
            max-width: 750px;
            z-index: 2;
            background: rgba(16, 12, 8, 0.55);
            padding: 40px 30px;
            border-radius: 32px;
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .hero h1 {
            font-family: 'Lexend', sans-serif;
            font-size: 56px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.04em;
            background: linear-gradient(120deg, var(--off-white) 20%, var(--orange-vibrant) 70%, var(--terracotta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hero p {
            font-size: 17px;
            line-height: 1.7;
            color: var(--muted-light);
            opacity: 0.95;
            margin-bottom: 35px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Centered Action Button Containers */
        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Pill Buttons Styled with the Rich Warm Gradients */
        .btn {
            background: linear-gradient(90deg, var(--orange-vibrant), var(--terracotta));
            color: var(--text-white);
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.03em;
            border: none;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            box-shadow: 0 10px 25px rgba(255, 148, 8, 0.35);
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(255, 148, 8, 0.55);
        }

        .btn-outline {
            background: transparent;
            color: var(--off-white);
            border: 2px solid var(--off-white);
            box-shadow: none;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--orange-vibrant);
            box-shadow: none;
        }

        /* Main Content Structure Grid */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 6%;
        }

        .section-title {
            font-family: 'Lexend', sans-serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 50px;
            color: var(--off-white);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
        }

        /* Dark Premium Glass Panels */
        .product-card {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 36px 36px 12px 36px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .product-img-wrapper {
            width: 100%;
            height: 250px;
            border-radius: 24px 24px 8px 24px;
            overflow: hidden;
            margin-bottom: 20px;
            background: rgba(16, 12, 8, 0.4);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--off-white);
            margin-bottom: 8px;
        }

        .product-price {
            font-family: 'Lexend', sans-serif;
            color: var(--orange-vibrant);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .product-card .btn {
            width: 100%;
            padding: 12px;
            font-size: 13px;
        }

        /* Custom Custom Space Workspace */
        .custom-order-section {
            background: linear-gradient(150deg, rgba(149, 18, 44, 0.2) 0%, rgba(16, 12, 8, 0.6) 100%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 60px 5%;
            margin-top: 100px;
        }

        .custom-form-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--orange-vibrant);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--glass-border);
            background: rgba(16, 12, 8, 0.5);
            border-radius: 18px;
            font-size: 14px;
            color: var(--text-white);
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--orange-vibrant);
            background: rgba(16, 12, 8, 0.8);
            box-shadow: 0 0 15px rgba(255, 148, 8, 0.15);
        }

        /* Sliding Sheet Drawer */
        .cart-sidebar {
            position: fixed;
            right: -440px;
            top: 0;
            width: 400px;
            height: 100%;
            background: linear-gradient(180deg, var(--near-black) 0%, #1a1510 100%);
            box-shadow: -15px 0 40px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--glass-border);
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .cart-header h3 {
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            color: var(--off-white);
        }

        .close-cart {
            font-size: 24px;
            cursor: pointer;
            color: var(--muted-light);
            transition: color 0.2s;
        }
        .close-cart:hover { color: var(--orange-vibrant); }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .cart-item-details h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--off-white);
        }

        .cart-item-details small {
            color: var(--orange-vibrant);
            font-weight: 600;
        }

        .remove-item {
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 14px;
        }
        .remove-item:hover { color: #FF4D4D; }

        .cart-total {
            margin-top: 30px;
            border-top: 1px solid var(--glass-border);
            padding-top: 25px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            color: var(--off-white);
        }

        .checkout-btn {
            width: 100%;
            margin-top: 30px;
        }

        /* Footnote Footer */
        footer {
            text-align: center;
            padding: 80px 20px 40px 20px;
            margin-top: 60px;
            border-top: 1px solid var(--glass-border);
            background: rgba(16, 12, 8, 0.4);
        }

        footer p {
            font-size: 13px;
            color: var(--muted-light);
            opacity: 0.7;
        }

        .social-icons {
            margin-top: 25px;
        }

        .social-icons a {
            font-size: 20px;
            color: var(--muted-light);
            opacity: 0.7;
            margin: 0 15px;
            transition: color 0.3s;
        }
        .social-icons a:hover { color: var(--orange-vibrant); opacity: 1; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 36px; }
            .hero-content { padding: 30px 15px; }
            .hero-buttons { flex-direction: column; gap: 12px; }
            .btn { width: 100%; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <!-- Header Grid with Image Logo Asset -->
    <header>
        <a href="#" class="logo-container">
            <img src="Untitled_design__1_-removebg-preview.png" alt="Crafty Duo Logo" class="header-logo">
        </a>
        <ul class="nav-links">
            <li><a href="#" class="active-link">home</a></li>
            <li><a href="#catalog">catalog</a></li>
            <li><a href="#custom">Custom Order</a></li>
        </ul>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <!-- Hero Frame Setup - Immersive Centered Cover Style -->
    <section class="hero">
        <div class="hero-content">
            <h1>Two Generations, One Passion</h1>
            <p>Welcome to Crafty Duo ~ <b>Handmade with Love.</b></p>
            <div class="hero-buttons">
                <a href="#catalog" class="btn">View Collection</a>
                <a href="#custom" class="btn btn-outline">Order Custom</a>
            </div>
        </div>
    </section>

    <!-- Main Section Structure Container -->
    <div class="main-container">
        
        <!-- Studio Showroom Portfolio -->
        <section id="catalog" style="margin-bottom: 80px;">
            <h2 class="section-title">Ready Studio Catalog</h2>
            <div class="products-grid" id="products-container">
                <!-- Programmatically Injected Items -->
            </div>
        </section>

        <!-- Custom Custom Workspace Form -->
        <section class="custom-order-section" id="custom">
            <h2 class="section-title" style="text-align: center; margin-bottom: 10px;">Custom Order</h2>
            <!-- <p style="text-align: center; font-size: 14px; color: var(--muted-light); opacity:0.8; max-width: 460px; margin: 0 auto 50px auto; line-height: 1.6;">
                Configure structural blueprints, fiber densities, or unique gradient matching profiles below to submit your design matrix request.
            </p> -->

            <div class="custom-form-container">
                <form id="customForm" onsubmit="submitCustomOrder(event)">
                    <div class="form-group">
                        <label for="custom-item">Structural Frame Framework</label>
                        <select id="custom-item" required>
                            <option value="">-- Select Structural Category --</option>
                            <option value="Plushie / Amigurumi">Amigurumi Art Object</option>
                            <option value="Hat / Beanie / Bandana">Custom Structural Headwear</option>
                            <option value="Bag / Tote">Studio Knit Tote Layout</option>
                            <option value="Crochet Clothing">Custom Fine Apparel Form</option>
                            <option value="Other / Unique Idea">Experimental Yarn Sculpture</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="custom-colors">Palette Hue Targets</label>
                        <input type="text" id="custom-colors" placeholder="e.g., Crimson, coral pinks, gold trims" required>
                    </div>

                    <div class="form-group">
                        <label for="custom-details">Configuration Spec Log</label>
                        <textarea id="custom-details" rows="4" placeholder="Describe scaling profiles, pattern rules, or design elements..." required></textarea>
                    </div>

                    <button type="submit" class="btn" style="width:100%; font-size:15px; padding: 16px;">Transmit Parameters to WhatsApp &nbsp;<i class="fab fa-whatsapp"></i></button>
                </form>
            </div>
        </section>
    </div>

    <!-- Sliding Sheet Cart Overlay Drawer -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Shopping Bag</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cart-items-container">
            <!-- Dynamic Cart Items -->
        </div>
        <div class="cart-total">
            <span>Subtotal:</span>
            <span id="cart-total-price">$0.00</span>
        </div>
        <button class="btn checkout-btn" onclick="checkoutViaWhatsApp()">Finalize Order Details &nbsp;<i class="fab fa-whatsapp"></i></button>
    </div>

    <!-- Footer Footnote -->
    <footer>
        <p>&copy; 2026 Crafty Duo Studio.</p>
        <div class="social-icons">
            <a href="https://www.instagram.com/_crafty.duo/" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <script>
        // CONFIGURATION: Set your active WhatsApp target number here
        const WHATSAPP_NUMBER = "9054950680"; 

        const products = [
            { id: 1, name: "Rose Bouquet : Red", price: 15.00, img: "Looking for a gift that lasts forever Handmade Crochet Rose Bouquet ❤️ No wilting, no fading—ju.webp" },
            { id: 2, name: "Tulip : Red", price: 25.00, img: "Screenshot 2026-06-29 205840.png" },
            { id: 3, name: "Tulip Bouquet : Multi Color", price: 20.00, img: "Screenshot 2026-06-29 205634.png" },
            { id: 4, name: "Rose & Sundflower Bouquet", price: 35.00, img: "A perfect gift that never dries🌻🌹Customization available ✨DM to order 💌.webp" }
        ];

        let cart = [];

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="${product.img}" alt="${product.name}" class="product-img">
                    </div>
                    <h3 class="product-title">${product.name}</h3>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <button class="btn" onclick="addToCart(${product.id})">Add to Basket</button>
                </div>
            `).join('');
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        function updateCart() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalCount;

            const cartContainer = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="text-align:center; color:var(--muted-light); opacity: 0.6; font-size:13px; margin-top:40px;">Your shopping bag is completely empty.</p>';
            } else {
                cartContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <small>$${item.price.toFixed(2)} &times; ${item.quantity}</small>
                        </div>
                        <span class="remove-item" onclick="removeFromCart(${item.id})"><i class="fa-regular fa-trash-can"></i></span>
                    </div>
                `).join('');
            }

            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total-price').innerText = `$${totalPrice.toFixed(2)}`;
        }

        function checkoutViaWhatsApp() {
            if (cart.length === 0) {
                alert("Your shopping bag is empty!");
                return;
            }

            let message = "Hello Crafty Duo! 🌸 I'd like to check out with these studio catalog line items:\n\n";
            cart.forEach(item => {
                message += `• ${item.name} (Qty: ${item.quantity}) - $${(item.price * item.quantity).toFixed(2)}\n`;
            });
            
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `\n*Subtotal Request Amount:* $${totalPrice.toFixed(2)}\n\nPlease advise on order approval and timeline setups.`;

            sendWhatsAppMessage(message);
        }

        function submitCustomOrder(event) {
            event.preventDefault();

            const itemType = document.getElementById('custom-item').value;
            const colors = document.getElementById('custom-colors').value;
            const details = document.getElementById('custom-details').value;

            let message = "✨ *CUSTOM DESIGN LOG* ✨\n\n";
            message += `🧵 *Framework Configuration:* ${itemType}\n`;
            message += `🎨 *Selected Theme Targets:* ${colors}\n`;
            message += `📝 *Spec Log Details:* ${details}\n\n`;
            message += "Please analyze this configuration matrix and return verification/pricing details. Thank you!";

            sendWhatsAppMessage(message);
        }

        function sendWhatsAppMessage(text) {
            const encodedMessage = encodeURIComponent(text);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
        }

        displayProducts();
    </script>
</body>
</html>
